<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permohonan Koordinasi - SIKORDA</title>
  <link rel="stylesheet" href="form-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar">
    <div class="nav-brand">
      <img src="https://raw.githubusercontent.com/ungumanggis199-svg/MBG-Muna/main/Logo-Kejaksaan%20(1)(1).png" alt="Logo" class="logo" />
      <div class="brand-text"><h1>SIKORDA</h1><span>Sistem Koordinasi Penyidik &amp; Jaksa</span></div>
    </div>
    <nav class="nav-links">
      <a href="../index.html">Beranda</a>
      <a href="permohonan.html" class="active">Permohonan Koordinasi</a>
      <a href="../monitoring.html">Monitoring</a>
      <button class="btn-login" onclick="openLogin()">Login Jaksa</button>
    </nav>
    <div class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  </header>

  <section id="permohonan" class="section" style="padding-top: 40px;">
    <div class="section-header">
      <h2>Formulir Permohonan Koordinasi</h2>
      <div class="divider"></div>
    </div>
    <form id="formPermohonan" class="form-box">
      <!-- Masukkan seluruh fieldset A sampai J di sini sesuai form yang Anda buat -->
      <!-- Contoh fieldset A -->
      <fieldset>
        <legend>A. Identitas Perkara</legend>
        <div class="grid-2">
          <div class="input-group">
            <label>Nomor Laporan Polisi</label>
            <input type="text" name="nomor_lp" placeholder="Masukkan Nomor LP" />
          </div>
          <!-- Tambahkan input lain sesuai kebutuhan -->
        </div>
      </fieldset>
      <!-- Tambahkan fieldset lain sesuai form lengkap Anda -->
      <button type="submit" class="btn-submit">Kirim Permohonan</button>
    </form>
  </section>

  <script src="../script.js"></script>
</body>
</html>
